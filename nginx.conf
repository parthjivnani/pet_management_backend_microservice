# Nginx config for pet management microservices (no Docker)
# Run Nginx on Windows: download from nginx.org, extract, then:
#   nginx -c /path/to/this/nginx.conf
# Or replace the conf folder's nginx.conf with this file.

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # Upstreams point to localhost with different ports (no Docker)
    upstream auth_service {
        server 127.0.0.1:8000;
    }

    upstream species_service {
        server 127.0.0.1:8001;
    }

    upstream pet_service {
        server 127.0.0.1:8002;
    }

    upstream adoption_service {
        server 127.0.0.1:8003;
    }

    server {
        listen 8080;
        server_name localhost;

        # Auth / User service
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Species service (admin only)
        location /api/species {
            proxy_pass http://species_service/api/species;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Pet service (/api/pets and /api/pets/...)
        location /api/pets {
            proxy_pass http://pet_service/api/pets;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Adoption service
        location /api/adoptions/ {
            proxy_pass http://adoption_service/api/adoptions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
